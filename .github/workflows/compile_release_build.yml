name: Compile release build

on:
  push:
    branches:
      - master

    paths:
      - "crates/*/src/**"

  release:
    types:
      - published

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  compile_ubuntu_build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    container:
      image: ubuntu:devel

      env:
        DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Configure apt to keep downloaded packages
        run: |
          rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' > /etc/apt/apt.conf.d/keep-cache

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-ubuntu-devel-release-${{ hashFiles('.github/workflows/compile_release_build.yml') }}
          restore-keys: |
            apt-ubuntu-devel-release-
            
      - name: Install build dependencies
        run: |
          apt update
          apt install -y git curl build-essential libgtk-4-dev libadwaita-1-dev

      - name: Download rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compile release build
        run: cargo build -p anime-games-launcher --release --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-native-build
          path: target/release/anime-games-launcher
