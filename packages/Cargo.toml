[package]
name = "agl-packages"
version = "0.1.0"
authors = ["Nikita Podvirnyi <krypt0nn@vk.com>"]
license = "GPL-3.0-or-later"
edition = "2024"
publish = false

[features]
tracing = [
    "agl-core/tracing",
    "dep:tracing"
]

packages-resolver = ["agl-core/archives-all"]

default = [
    "agl-core/hashes-seahash",
    # "tracing",
    "packages-resolver"
]

[dependencies.agl-core]
path = "../core"
default-features = false
features = [
    "tasks",
    "network-downloader"
]

[dependencies.mlua]
package = "mlua"
version = "0.10"
features = ["luau-jit", "serialize", "send", "error-send"]
optional = true

[dependencies]
thiserror = "1.0"
rand = "0.9"
base32 = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Tracing
tracing = { version = "0.1", optional = true }
