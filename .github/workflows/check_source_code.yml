name: Check source code

on:
  push:
    branches:
      - master
      - next

    paths:
      - "crates/*/src/**"

  pull_request:
    branches:
      - master
      - next

    paths:
      - "crates/*/src/**"

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check_source_code:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    container:
      image: ubuntu:devel

      env:
        DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Configure apt to keep downloaded packages
        run: |
          rm -f /etc/apt/apt.conf.d/docker-clean
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' > /etc/apt/apt.conf.d/keep-cache

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-ubuntu-devel-check-${{ hashFiles('.github/workflows/check_source_code.yml') }}
          restore-keys: |
            apt-ubuntu-devel-check-

      - name: Install build dependencies
        run: |
          apt update
          apt install -y git curl build-essential libgtk-4-dev libadwaita-1-dev

      - name: Install runtime dependencies
        run: |
          apt install -y tar zip p7zip-full gzip bzip2 zstd

      - name: Download rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check source code
        run: cargo check --verbose

      - name: Perform source code tests
        run: cargo test --verbose
